[tox]
envlist =
    ; Django 4.2 + supported Wagtail versions
    py{310,311,312}-django42-wagtail{63,70,72,73}-{sqlite,postgres}
    ; Django 5.2 + supported Wagtail versions
    py{310,311,312,313,314}-django52-wagtail{63,70,72,73}-{sqlite,postgres}
    ; Django 6.0 + supported Wagtail versions
    py3{312,313,314}-django60-wagtail{72,73}-{sqlite,postgres}

[testenv]
allowlist_externals = coverage
commands = coverage run -p testmanage.py test --deprecation all --noinput
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14

deps =
    coverage
    django42: django>=4.2,<4.3
    django52: django>=5.2,<5.3
    django60: django>=6.0,<6.1

    wagtail63: wagtail~=6.3.0
    wagtail70: wagtail~=7.0.0
    wagtail72: wagtail~=7.2.0
    wagtail73: wagtail~=7.3.0

    postgres: psycopg2>=2.9
extras = testing

setenv =
    postgres: DATABASE_URL={env:DATABASE_URL:postgres:///wagtail_ab_testing}

[testenv:future]
allowlist_externals = coverage
deps =
    coverage
    git+https://github.com/wagtail/wagtail.git@main#egg=Wagtail
    git+https://github.com/django/django.git@main#egg=Django
extras = testing
setenv =
    postgres: DATABASE_URL={env:DATABASE_URL:postgres:///wagtail_ab_testing}
